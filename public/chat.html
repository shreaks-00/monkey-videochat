<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Monkey — Free Live Video Chat" />
  <title>Monkey — Chat</title>

  <!-- Google Fonts -->
  <link rel="icon" href="img/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/chat.css" />
</head>
<body>

  <!-- ── Top Bar ─────────────────────────────────────────────────────────── -->
  <header class="topbar" id="topbar">
    <a href="/" class="topbar-logo" id="topbar-logo">
      <img src="img/logo.png" alt="Monkey Logo" class="nav-logo-img">
      Monkey
    </a>

    <!-- Connection status badge -->
    <div class="status-badge" id="status-badge" data-status="idle">
      <span class="status-dot"></span>
      <span class="status-text" id="status-text">Idle</span>
    </div>

    <a href="/" class="topbar-leave" id="topbar-leave" title="Leave">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Leave
    </a>
  </header>

  <!-- ── Main Video Area & Chat ──────────────────────────────────────────── -->
  <main class="chat-main" id="chat-main">

    <!-- Video Area -->
    <div class="chat-video-area" id="chat-video-area">
      <!-- Stranger video tile -->
      <div class="video-tile video-tile--stranger" id="tile-stranger">

      <!-- Status overlay shown before/after connection -->
      <div class="video-overlay" id="overlay-stranger">
        <div class="overlay-spinner" id="overlay-spinner" aria-hidden="true">
          <div class="bouncy-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
        </div>
        <p class="overlay-msg" id="overlay-msg">Click <strong>Start</strong> to find someone</p>
      </div>

      <!-- Stranger's video stream -->
      <video id="remote-video" autoplay playsinline></video>

      <!-- Stranger label -->
      <div class="tile-label tile-label--stranger" aria-label="Stranger video">
        <span class="tile-label-dot tile-label-dot--stranger"></span>
        Stranger
      </div>
    </div>

    <!-- Local (you) video tile -->
    <div class="video-tile video-tile--local" id="tile-local">
      <video id="local-video" autoplay playsinline muted></video>

      <!-- Cam-off placeholder -->
      <div class="cam-off-overlay" id="cam-off-overlay" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40" opacity="0.5">
          <path d="M15.536 8.464A5 5 0 0112 7a5 5 0 00-5 5c0 1.381.56 2.63 1.464 3.536M9.88 9.88A5 5 0 0017 12a5 5 0 01-5 5 4.978 4.978 0 01-2.12-.464M3 3l18 18" stroke-linecap="round"/>
        </svg>
        <span>Camera off</span>
      </div>

      <div class="tile-label" aria-label="Your video">
        <span class="tile-label-dot"></span>
        You
      </div>
    </div>
    </div> <!-- End Video Area -->

    <!-- Chat Sidebar -->
    <aside class="chat-sidebar" id="chat-sidebar">
      <div class="chat-header">
        <h3>Text Chat</h3>
        <button class="chat-close-btn" id="btn-close-chat" title="Close Chat" aria-label="Close Chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <path d="M18 6L6 18M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      
      <div class="chat-messages" id="chat-messages">
        <!-- Messages will be injected here -->
        <div class="chat-system-msg">Chat is ready. Say hi!</div>
      </div>

      <form class="chat-input-area" id="chat-form">
        <input type="text" id="chat-input" class="chat-input" placeholder="Type a message..." autocomplete="off" disabled />
        <button type="submit" id="btn-send-chat" class="chat-send-btn" disabled aria-label="Send Message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </form>
    </aside>

  </main>

  <!-- ── Controls Bar ────────────────────────────────────────────────────── -->
  <footer class="controls-bar" id="controls-bar">
    <div class="controls-inner">

      <!-- Toggle controls (mic, cam) -->
      <div class="control-group" id="control-group-toggles">

        <button class="ctrl-btn ctrl-btn--icon" id="btn-mic" title="Toggle Microphone" data-active="true">
          <!-- mic on icon -->
          <svg class="icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="22" height="22">
            <rect x="9" y="2" width="6" height="12" rx="3"/>
            <path d="M5 10a7 7 0 0014 0M12 19v3M9 22h6" stroke-linecap="round"/>
          </svg>
          <!-- mic off icon -->
          <svg class="icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="22" height="22">
            <path d="M15 9.34V6a3 3 0 00-5.68-1.33M9 9v3a3 3 0 005.12 2.12M17 14a7 7 0 01-9.86 2.85M19 10a7 7 0 01-.34 2.14M12 19v3M9 22h6M3 3l18 18" stroke-linecap="round"/>
          </svg>
          <span class="ctrl-label">Mic</span>
        </button>

        <button class="ctrl-btn ctrl-btn--icon" id="btn-cam" title="Toggle Camera" data-active="true">
          <!-- cam on icon -->
          <svg class="icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="22" height="22">
            <path d="M15 10l5-3v10l-5-3V10z"/><rect x="2" y="7" width="13" height="12" rx="2"/>
          </svg>
          <!-- cam off icon -->
          <svg class="icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="22" height="22">
            <path d="M15.5 10.5l4.5-2.5v10l-4.5-2.5M2 7h4.5m3.5 0H15v5m0 4H4a2 2 0 01-2-2V9M3 3l18 18" stroke-linecap="round"/>
          </svg>
          <span class="ctrl-label">Cam</span>
        </button>

      </div>

      <!-- Primary action controls -->
      <div class="control-group control-group--primary" id="control-group-primary">

        <button class="ctrl-btn ctrl-btn--start" id="btn-start" title="Start / Find Stranger">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <circle cx="12" cy="12" r="10"/>
            <path d="M10 8l6 4-6 4V8z" fill="currentColor" stroke="none"/>
          </svg>
          Start
        </button>

        <button class="ctrl-btn ctrl-btn--next" id="btn-next" title="Skip to next stranger" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <path d="M5 12h14M13 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Next
        </button>

        <button class="ctrl-btn ctrl-btn--end" id="btn-end" title="End call" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7 2 2 0 012 2v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.42 19.42 0 013.43 9.68 2 2 0 015.41 7.5h3a2 2 0 012 1.72c.12.96.36 1.9.7 2.81a2 2 0 01-.45 2.12L9.4 15.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M23 1L1 23" stroke-linecap="round"/>
          </svg>
          End
        </button>

      </div>

      <!-- Secondary action controls / toggles -->
      <div class="control-group control-group--spacer" aria-hidden="false">
        <button class="ctrl-btn ctrl-btn--icon chat-toggle-btn" id="btn-toggle-chat" title="Toggle Chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="22" height="22">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="ctrl-label">Chat</span>
        </button>
      </div>

    </div>
  </footer>

  <!-- ── Toast Notification ──────────────────────────────────────────────── -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <!-- Socket.IO client (served by server) -->
  <script src="/socket.io/socket.io.js"></script>
  <!-- App modules -->
  <script src="js/ui.js"></script>
  <script src="js/webrtc.js"></script>
  <script src="js/socket.js"></script>
</body>
</html>
